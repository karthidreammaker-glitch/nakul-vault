<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Naamkaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Outfit:wght@400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #2d050a; color: #fff; overflow-x: hidden; user-select: none; margin:0; }
        .font-regal { font-family: 'Cinzel', serif; }
        .perspective { perspective: 1000px; }
        .transform-3d { transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rotate-y-180 { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto">
    <canvas id="marigold-dust" class="absolute inset-0 pointer-events-none z-0 opacity-40"></canvas>

    <!-- FRONT PAGE -->
    <div id="intro-zone" class="text-center z-10">
        <h1 class="font-regal text-3xl font-black text-amber-400 mb-8 tracking-widest">SHUBH AARAMBH</h1>
        <button onclick="startGame()" class="w-32 h-32 rounded-full bg-gradient-to-br from-amber-400 to-red-800 p-2 shadow-2xl active:scale-95 transition">
            <div class="w-full h-full rounded-full bg-[#2d050a] flex items-center justify-center font-regal font-black text-amber-300">ENTER</div>
        </button>
    </div>

    <!-- GAME UI -->
    <div id="game-zone" class="hidden w-full z-10">
        <div class="text-center w-full pt-2">
            <span class="text-amber-400 text-[10px] font-black uppercase tracking-widest">Royal Vault Engaged</span>
            <h1 class="font-regal text-xl font-black mt-2 text-white">REVEAL THE NAME</h1>
            <!-- MOTIVATION BOX -->
            <div id="motivation" class="mt-4 text-sm italic text-amber-200/80 font-medium h-6">
                "Begin your journey, noble traveler."
            </div>
            <div class="flex justify-center gap-6 mt-2 text-xs font-bold text-amber-200/50">
                <span>Mistakes: <span id="mistake-count" class="text-rose-400">0</span></span>
            </div>
        </div>

        <div id="board-zone" class="w-full my-8 flex flex-col gap-4 items-center justify-center"></div>

        <div id="control-zone" class="w-full flex flex-col gap-3 pb-6 px-2">
            <div id="keyboard" class="grid grid-cols-7 gap-2"></div>
        </div>
    </div>

    <script>
        const secretString = "NAKULVEDANTH";
        let rightSet = new Set(); let mistakeCount = 0;
        const encouragements = [
            "A brilliant start! Find the next stone.",
            "Wisdom guides your hand. Continue!",
            "Excellent choice. The name reveals itself.",
            "The stars favor your persistence.",
            "You are halfway to the truth!",
            "Steady now, the mystery deepens.",
            "Gracefully done. Only a few remain.",
            "The court watches your success.",
            "Almost there, noble seeker.",
            "A momentous revelation awaits!"
        ];

        function startGame() {
            document.getElementById('intro-zone').classList.add('hidden');
            document.getElementById('game-zone').classList.remove('hidden');
            initBoard(); initKeyboard();
        }

        function initBoard() {
            const dock = document.getElementById('board-zone'); dock.innerHTML = '';
            ["NAKUL", "VEDANTH"].forEach(word => {
                const row = document.createElement('div'); row.className = 'flex gap-2 justify-center';
                word.split('').forEach(char => {
                    const isFound = rightSet.has(char);
                    const slot = document.createElement('div');
                    slot.className = 'perspective w-12 h-14';
                    slot.innerHTML = `
                        <div class="transform-3d relative w-full h-full rounded-lg shadow-lg ${isFound ? 'rotate-y-180' : ''}">
                            <div class="backface-hidden absolute inset-0 bg-red-950 border border-amber-600 rounded-lg flex items-center justify-center text-amber-700 font-black text-2xl">?</div>
                            <div class="backface-hidden rotate-y-180 absolute inset-0 bg-amber-400 rounded-lg flex items-center justify-center text-red-950 font-black text-2xl">${char}</div>
                        </div>
                    `;
                    row.appendChild(slot);
                });
                dock.appendChild(row);
            });
        }

        function initKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const btn = document.createElement('button'); btn.innerText = l;
                btn.className = 'h-10 rounded bg-red-950 text-amber-200 font-black border border-amber-800 active:scale-95';
                btn.onclick = () => {
                    if (secretString.includes(l)) {
                        if (!rightSet.has(l)) {
                            rightSet.add(l);
                            document.getElementById('motivation').innerText = `"${encouragements[rightSet.size - 1] || "Magnificent!"}"`;
                            confetti({ particleCount: 20, gravity: 0.5 });
                        }
                        initBoard();
                    } else { mistakeCount++; document.getElementById('mistake-count').innerText = mistakeCount; }
                };
                kb.appendChild(btn);
            });
        }

        // Marigold Dust Effect
        const canvas = document.getElementById('marigold-dust'); const ctx = canvas.getContext('2d');
        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<30; i++) { ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 2, 0, 7); ctx.fill(); }
        }
        draw();
    </script>
</body>
</html>
