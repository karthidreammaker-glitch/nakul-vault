<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Naamkaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #070913; color: #f8fafc; overflow-x: hidden; user-select: none; margin:0; }
        .perspective { perspective: 1000px; }
        .transform-3d { transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rotate-y-180 { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
        .floating { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-4 max-w-md mx-auto">

    <div id="header-zone" class="text-center w-full pt-4">
        <span class="bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 px-3.5 py-1 rounded-full text-xs font-black tracking-widest uppercase">Royal Vault Engaged</span>
        <h1 class="text-2xl font-black mt-3 text-white">THE NAME DROP</h1>
        <div class="flex justify-center items-center gap-3 mt-2 text-xs font-bold text-slate-400">
            <span>Mistakes: <span id="mistake-count" class="text-rose-400">0</span></span>
            <span>Unlocked: <span id="found-count" class="text-emerald-400">0</span>/12</span>
        </div>
    </div>

    <div id="board-zone" class="w-full my-auto flex flex-col gap-4 items-center justify-center py-6">
    </div>

    <div id="control-zone" class="w-full flex flex-col gap-3 pb-6 max-w-sm">
        <button id="hint-btn" onclick="showHint()" class="w-full py-3 bg-slate-800 border border-slate-700 rounded-xl text-xs font-extrabold text-indigo-400">💡 Tap for Hint</button>
        <div id="keyboard" class="grid grid-cols-7 gap-2 pt-1"></div>
    </div>

    <script>
        const words = ["NAKUL", "VEDANTH"];
        const secretString = "NAKULVEDANTH";
        let rightSet = new Set(); let wrongSet = new Set(); let mistakeCount = 0;

        function initBoard() {
            const dock = document.getElementById('board-zone'); dock.innerHTML = '';
            words.forEach(w => {
                const row = document.createElement('div'); row.className = 'flex gap-2 justify-center';
                w.split('').forEach(char => {
                    const isFound = rightSet.has(char);
                    const slot = document.createElement('div');
                    slot.className = 'perspective w-12 h-14';
                    slot.innerHTML = `
                        <div class="transform-3d relative w-full h-full rounded-xl shadow-lg ${isFound ? 'rotate-y-180' : ''}">
                            <div class="backface-hidden absolute inset-0 bg-slate-800 border-2 border-slate-700 rounded-xl flex items-center justify-center text-slate-500 font-black text-2xl">?</div>
                            <div class="backface-hidden rotate-y-180 absolute inset-0 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-2xl border border-indigo-400">${char}</div>
                        </div>
                    `;
                    row.appendChild(slot);
                });
                dock.appendChild(row);
            });
            document.getElementById('found-count').innerText = Array.from(rightSet).length;
        }

        function initKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const btn = document.createElement('button'); btn.innerText = l;
                btn.className = 'h-11 rounded-lg font-black bg-slate-800 text-slate-200 border border-slate-700 active:scale-95';
                btn.onclick = () => {
                    if (secretString.includes(l)) { rightSet.add(l); initBoard(); }
                    else { wrongSet.add(l); mistakeCount++; document.getElementById('mistake-count').innerText = mistakeCount; }
                    initKeyboard();
                };
                kb.appendChild(btn);
            });
        }
        initBoard(); initKeyboard();
    </script>
</body>
</html>
