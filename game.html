<script>
    const secretString = "NAKULVEDANTH";
    const words = ["NAKUL", "VEDANTH"];
    const uniqueChars = new Set(secretString.split(''));
    let rightSet = new Set(); 
    let wrongSet = new Set();
    let mistakeCount = 0;
    let isGameOver = false;
    let isWin = false;
    let bgMusic; // Audio variable

    // --- AMBIENT MUSIC LOGIC ---
    async function startAmbientMusic() {
        await Tone.start();
        
        // Soft, atmospheric pad
        bgMusic = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 3, decay: 1, sustain: 0.8, release: 5 }
        }).toDestination();

        bgMusic.volume.value = -24; // Very quiet background

        const notes = ["C3", "G3", "D4", "A3"];
        
        const loop = new Tone.Loop((time) => {
            const note = notes[Math.floor(Math.random() * notes.length)];
            bgMusic.triggerAttackRelease(note, "2n", time);
        }, "4n");

        Tone.Transport.start();
        loop.start(0);
    }

    // --- ASTROLOGER CLUES & BLESSINGS ---
    const staticClues = [
        "His first name belongs to the handsome and wise fourth Pandava.",
        "The stars whisper: His second name means the ultimate truth and culmination of the Vedas.",
        "Look closely: The letter 'N' appears twice in this sacred arrangement.",
        "A celestial hint: There are exactly four unique vowels waiting to be found.",
        "The ancestors guide you: Focus your mind on the letters A, E, and U."
    ];
    let currentClueIdx = 0;

    function typeWriterEffect(elementId, text, speed = 60) {
        const el = document.getElementById(elementId);
        el.innerHTML = "";
        el.classList.add('cursor');
        let i = 0;
        
        function type() {
            if (i < text.length) {
                el.innerHTML = text.substring(0, i+1);
                i++;
                setTimeout(type, speed);
            } else {
                el.classList.remove('cursor');
            }
        }
        type();
    }

    async function requestAIIntel() {
        if (isGameOver) return;
        const btn = document.getElementById('ai-hint-btn');
        btn.disabled = true;
        btn.classList.add('opacity-50');

        const clue = staticClues[currentClueIdx % staticClues.length];
        currentClueIdx++;
        
        typeWriterEffect('ai-terminal-output', `"${clue}"`, 55);
        
        setTimeout(() => {
            btn.disabled = false;
            btn.classList.remove('opacity-50');
        }, 2000);
    }

    async function generateDebrief() {
        const btn = document.getElementById('ai-debrief-btn');
        btn.disabled = true;
        btn.innerText = "Listening...";
        btn.classList.add('opacity-50');

        const text = isWin 
            ? "May the blessings of the cosmos and our ancestors forever protect little Nakul Vedanth. May his life be filled with profound wisdom, strength, and boundless joy."
            : "Do not lose heart. The stars are simply testing our patience. The ceremony shall resume when the time is auspicious.";

        typeWriterEffect('ai-debrief-output', `"${text}"`, 60);
        btn.innerText = "Blessing Received";
    }

    const encouragements = [
        "An auspicious choice. The path clears.",
        "The ancestors smile upon this letter.",
        "Harmony is restored. Continue gently.",
        "The sacred syllables reveal themselves.",
        "A beautiful step toward the truth.",
        "The divine light shines brighter."
    ];

    function startGame() {
        // Initialize background music
        startAmbientMusic();

        const intro = document.getElementById('intro-zone');
        const game = document.getElementById('game-zone');
        
        intro.style.opacity = '0';
        setTimeout(() => {
            intro.classList.add('hidden');
            game.classList.remove('hidden');
            game.classList.add('flex');
            void game.offsetWidth;
            game.style.opacity = '1';
            initBoard(); 
            initKeyboard();
        }, 1000);
    }

    function initBoard() {
        const dock = document.getElementById('board-zone'); dock.innerHTML = '';
        words.forEach(word => {
            const row = document.createElement('div'); row.className = 'flex gap-2.5 justify-center';
            word.split('').forEach(char => {
                const isFound = rightSet.has(char);
                const slot = document.createElement('div');
                slot.className = 'perspective w-11 h-14 sm:w-14 sm:h-16 flex-shrink-0';
                slot.innerHTML = `
                    <div class="transform-3d relative w-full h-full shadow-lg rounded-md ${isFound || (isGameOver && !isWin) ? 'rotate-y-180' : ''}">
                        <div class="backface-hidden absolute inset-0 bg-[#042915] border-2 border-amber-600/70 rounded-md flex items-center justify-center text-amber-500/30 font-trad font-bold text-2xl">?</div>
                        <div class="backface-hidden rotate-y-180 absolute inset-0 ${isGameOver && !isWin && !isFound ? 'bg-red-950 border-red-800 text-red-300' : 'bg-gradient-to-br from-amber-50 to-amber-200 border-2 border-amber-400 text-[#02160b] shadow-[0_0_20px_rgba(251,191,36,0.4)]'} rounded-md flex items-center justify-center font-trad font-bold text-2xl sm:text-3xl">${char}</div>
                    </div>
                `;
                row.appendChild(slot);
            });
            dock.appendChild(row);
        });
    }

    function initKeyboard() {
        const kb = document.getElementById('keyboard'); kb.innerHTML = '';
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
            const btn = document.createElement('button'); btn.innerText = l;
            let customStyle = "bg-[#042915] text-amber-100 font-outfit font-medium border border-amber-800/60 hover:bg-[#063b1e] hover:border-amber-500 active:scale-95 transition-all duration-700 shadow-sm";
            if (rightSet.has(l)) customStyle = "bg-amber-900/40 text-amber-500 border-amber-900 opacity-50 cursor-default scale-95";
            if (wrongSet.has(l)) customStyle = "bg-red-950/40 text-red-800 border-red-950 opacity-30 cursor-default scale-95";
            btn.className = `h-10 sm:h-11 rounded-md flex items-center justify-center ${customStyle}`;
            btn.onclick = () => {
                if (isGameOver || rightSet.has(l) || wrongSet.has(l)) return;
                if (uniqueChars.has(l)) {
                    rightSet.add(l);
                    const msg = document.getElementById('motivation');
                    msg.style.opacity = 0;
                    setTimeout(() => {
                        msg.innerText = `"${encouragements[Math.floor(Math.random() * encouragements.length)]}"`;
                        msg.style.opacity = 1;
                    }, 500);
                    confetti({ particleCount: 30, gravity: 0.3, spread: 80, ticks: 250, colors: ['#fef3c7', '#fbbf24', '#b45309'], origin: {y: 0.7} });
                    initBoard();
                    initKeyboard();
                    checkEndGame();
                } else { 
                    wrongSet.add(l);
                    mistakeCount++; 
                    document.getElementById('mistake-count').innerText = mistakeCount; 
                    document.body.style.transition = "transform 0.4s ease-in-out";
                    document.body.style.transform = "translate(3px, 2px)";
                    setTimeout(() => document.body.style.transform = "translate(0, 0)", 400);
                    const msg = document.getElementById('motivation');
                    msg.style.opacity = 0;
                    setTimeout(() => {
                        msg.innerText = '"A shadow falls. Tread carefully, child."';
                        msg.style.opacity = 1;
                    }, 500);
                    initKeyboard();
                    checkEndGame();
                }
            };
            kb.appendChild(btn);
        });
    }

    function checkEndGame() {
        if (rightSet.size === uniqueChars.size) {
            isGameOver = true;
            isWin = true;
            setTimeout(showPostMissionModal, 2000);
        } else if (mistakeCount >= 5) {
            isGameOver = true;
            isWin = false;
            initBoard(); 
            setTimeout(showPostMissionModal, 2500);
        }
    }

    function showPostMissionModal() {
        const modal = document.getElementById('post-mission-modal');
        const title = document.getElementById('modal-title');
        const target = document.getElementById('modal-target');
        const tabs = document.getElementById('victory-tabs');
        
        if (isWin) {
            title.innerText = "YES MY NAME IS";
            tabs.classList.remove('hidden');
            switchTab('blessing');
            const duration = 3000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#fbbf24', '#fef3c7'], gravity: 0.4, ticks: 300 });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#fbbf24', '#fef3c7'], gravity: 0.4, ticks: 300 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        } else {
            title.innerText = "THE BABY WEEPS";
            title.className = "font-trad text-3xl font-bold text-red-500 mb-3 drop-shadow-[0_0_10px_rgba(248,113,113,0.5)]";
            target.classList.add('hidden');
            tabs.classList.add('hidden');
            switchTab('blessing');
            playBabyCry();
            document.getElementById('ai-debrief-output').innerText = "The child has grown restless... Pacifying the baby and preparing to restart the ceremony.";
            setTimeout(() => window.location.reload(), 4500);
        }
        modal.classList.remove('hidden');
        setTimeout(() => modal.style.opacity = '1', 50);
    }

    const canvas = document.getElementById('divine-sparks'); 
    const ctx = canvas.getContext('2d');
    let particles = [];
    function initParticles() {
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<35; i++) { 
            particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2 + 0.5, speed: Math.random() * 0.3 + 0.1, alpha: Math.random() * 0.5 + 0.2 });
        }
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            ctx.fillStyle = `rgba(251, 191, 36, ${p.alpha})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            p.y -= p.speed;
            if(p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', initParticles);
    initParticles();
    draw();

    async function playBabyCry() {
        await Tone.start();
        const synth = new Tone.Synth({ oscillator: { type: "fmsawtooth", modulationIndex: 2, modulationType: "triangle" }, envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 1 } }).toDestination();
        const vibrato = new Tone.Vibrato(6, 0.1).toDestination();
        synth.connect(vibrato);
        const now = Tone.now();
        synth.triggerAttackRelease("E5", "8n", now); synth.frequency.rampTo("C5", 0.3, now + 0.1);
        synth.triggerAttackRelease("Eb5", "8n", now + 0.8); synth.frequency.rampTo("B4", 0.3, now + 0.9);
        synth.triggerAttackRelease("E5", "2n", now + 1.6); synth.frequency.rampTo("A4", 0.8, now + 1.8);
    }

    function switchTab(tab) {
        const blessingBtn = document.getElementById('tab-blessing-btn');
        const meaningBtn = document.getElementById('tab-meaning-btn');
        const blessingTab = document.getElementById('tab-blessing');
        const meaningTab = document.getElementById('tab-meaning');
        if (tab === 'blessing') {
            blessingTab.classList.remove('hidden'); meaningTab.classList.add('hidden');
            blessingBtn.classList.add('text-amber-400', 'border-amber-400'); blessingBtn.classList.remove('text-amber-600', 'border-transparent');
            meaningBtn.classList.add('text-amber-600', 'border-transparent'); meaningBtn.classList.remove('text-amber-400', 'border-amber-400');
        } else {
            blessingTab.classList.add('hidden'); meaningTab.classList.remove('hidden');
            meaningBtn.classList.add('text-amber-400', 'border-amber-400'); meaningBtn.classList.remove('text-amber-600', 'border-transparent');
            blessingBtn.classList.add('text-amber-600', 'border-transparent'); blessingBtn.classList.remove('text-amber-400', 'border-amber-400');
        }
    }
</script>
