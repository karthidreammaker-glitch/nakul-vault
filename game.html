<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Naamkaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@800;900&family=Outfit:wght@400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #051319; color: #fdf6e3; overflow-x: hidden; user-select: none; margin:0; }
        .font-regal { font-family: 'Cinzel', serif; }
        .perspective { perspective: 1000px; }
        .transform-3d { transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rotate-y-180 { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 max-w-md mx-auto">
    <canvas id="marigold-dust" class="absolute inset-0 pointer-events-none z-0 opacity-75"></canvas>

    <!-- FRONT PAGE -->
    <div id="intro-zone" class="text-center z-10">
        <h1 class="font-regal text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-orange-400 mb-8">THE NAME DROP</h1>
        <button onclick="startGame()" class="w-36 h-36 rounded-full bg-gradient-to-b from-amber-400 to-amber-800 p-1 active:scale-95 transition shadow-[0_0_40px_rgba(251,191,36,0.3)]">
            <div class="w-full h-full rounded-full bg-[#051319] flex items-center justify-center flex-col">
                <span class="text-3xl mb-1">🖐️</span>
                <span class="font-regal text-[10px] font-black text-amber-200 uppercase">ENTER</span>
            </div>
        </button>
    </div>

    <!-- GAME UI (HIDDEN) -->
    <div id="game-zone" class="hidden w-full z-10">
        <div id="header-zone" class="text-center w-full pt-2">
            <span class="bg-teal-900 border border-teal-500 text-teal-300 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Royal Vault Engaged</span>
            <h1 class="font-regal text-2xl font-black mt-3 text-teal-100">Reveal The Name</h1>
            <div class="flex justify-center items-center gap-6 mt-3 text-xs font-bold text-amber-200/60">
                <span>Mistakes: <span id="mistake-count" class="text-rose-400">0</span></span>
                <span>Gifts: <span id="gift-count" class="text-amber-400">0</span>/10</span>
            </div>
        </div>

        <div id="board-zone" class="w-full my-8 flex flex-col gap-4 items-center justify-center"></div>

        <div id="control-zone" class="w-full flex flex-col gap-3 pb-6 px-2">
            <div id="keyboard" class="grid grid-cols-7 gap-2"></div>
        </div>
    </div>

    <!-- GIFT POPUP -->
    <div id="gift-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/80 p-6">
        <div class="bg-[#05151e] border-2 border-amber-500 p-6 rounded-2xl text-center shadow-2xl">
            <div id="gift-icon" class="text-6xl mb-2">🎁</div>
            <h4 class="text-amber-400 font-bold text-lg">Gift Unlocked!</h4>
            <button onclick="document.getElementById('gift-modal').classList.add('hidden')" class="mt-4 bg-teal-700 px-8 py-2 rounded-lg font-bold text-white">Continue</button>
        </div>
    </div>

    <script>
        const secretString = "NAKULVEDANTH";
        let rightSet = new Set(); let mistakeCount = 0;
        const gifts = ["🧸","🍼","🧦","👑","🧿","📚","🍦","🚲","🎧","🗝️"];
        const canvas = document.getElementById('marigold-dust'); const ctx = canvas.getContext('2d');

        function startGame() {
            document.getElementById('intro-zone').classList.add('hidden');
            document.getElementById('game-zone').classList.remove('hidden');
            initBoard(); initKeyboard();
        }

        function initBoard() {
            const dock = document.getElementById('board-zone'); dock.innerHTML = '';
            ["NAKUL", "VEDANTH"].forEach(word => {
                const row = document.createElement('div'); row.className = 'flex gap-2 justify-center';
                word.split('').forEach(char => {
                    const isFound = rightSet.has(char);
                    const slot = document.createElement('div');
                    slot.className = 'perspective w-12 h-14';
                    slot.innerHTML = `
                        <div class="transform-3d relative w-full h-full rounded-xl shadow-lg ${isFound ? 'rotate-y-180' : ''}">
                            <div class="backface-hidden absolute inset-0 bg-teal-950 border border-teal-500 rounded-xl flex items-center justify-center text-teal-500 font-black text-2xl">?</div>
                            <div class="backface-hidden rotate-y-180 absolute inset-0 bg-amber-400 rounded-xl flex items-center justify-center text-slate-950 font-black text-2xl">${char}</div>
                        </div>
                    `;
                    row.appendChild(slot);
                });
                dock.appendChild(row);
            });
        }

        function initKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(l => {
                const btn = document.createElement('button'); btn.innerText = l;
                btn.className = 'h-10 rounded bg-teal-900 text-teal-100 font-black border border-teal-700 active:scale-95';
                btn.onclick = () => {
                    if (secretString.includes(l)) {
                        if (!rightSet.has(l)) { rightSet.add(l); document.getElementById('gift-count').innerText = rightSet.size; showGift(rightSet.size - 1); }
                        initBoard();
                    } else { mistakeCount++; document.getElementById('mistake-count').innerText = mistakeCount; }
                };
                kb.appendChild(btn);
            });
        }

        function showGift(i) {
            if(i < gifts.length) {
                document.getElementById('gift-icon').innerText = gifts[i];
                document.getElementById('gift-modal').classList.remove('hidden');
                confetti({ particleCount: 50 });
            }
        }

        // Marigold Dust Animation
        function drawDust() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fbbf24";
                for(let i=0; i<30; i++) { ctx.beginPath(); ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 2, 0, 7); ctx.fill(); }
                requestAnimationFrame(animate);
            }
            animate();
        }
        drawDust();
    </script>
</body>
</html>
