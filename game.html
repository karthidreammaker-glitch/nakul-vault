<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Naamkaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@800;900&family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #051319; color: #fdf6e3; overflow-x: hidden; user-select: none; margin:0; }
        .font-regal { font-family: 'Cinzel', serif; }
        .perspective { perspective: 1000px; }
        .transform-3d { transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .rotate-y-180 { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
    </style>
</head>
<body class="relative flex flex-col items-center justify-between min-h-screen p-3 sm:p-4 max-w-md mx-auto z-10">

    <canvas id="marigold-dust" class="absolute inset-0 pointer-events-none z-0 opacity-75"></canvas>

    <div class="relative z-10 w-full flex flex-col items-center justify-between min-h-[95vh]">
        
        <!-- INTRO -->
        <div id="intro-zone" class="my-auto w-full flex flex-col items-center justify-center text-center p-4">
            <div class="inline-flex items-center gap-2 bg-teal-500/10 border border-teal-500/30 text-teal-300 px-4 py-1 rounded-full text-xs font-black tracking-widest uppercase mb-3 shadow-lg">
                <span class="text-teal-400">🪔</span> ROYAL CEREMONY
            </div>
            <h1 class="font-regal text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-100 to-emerald-400 mb-2">THE NAME DROP</h1>
            <p class="text-sm text-teal-100/90 mb-6">Our prince's official name is locked inside the royal vault. Open it to meet him.</p>
            
            <button onclick="startGame()" class="relative group w-36 h-36 rounded-full bg-gradient-to-b from-amber-300 via-amber-500 to-amber-700 p-1 shadow-[0_0_35px_rgba(6,182,212,0.4)] active:scale-95 transition-all">
                <div class="w-full h-full rounded-full bg-[#051319] flex flex-col items-center justify-center border-2 border-amber-400/50 shadow-inner">
                    <span class="font-regal text-[10px] font-black text-amber-200 uppercase">Start Reveal</span>
                </div>
            </button>
        </div>

        <!-- MISSION CONTROL -->
        <div id="header-zone" class="hidden text-center w-full pt-1">
            <div class="inline-flex items-center gap-1.5 bg-teal-500/10 border border-teal-500/30 text-teal-300 px-4 py-1 rounded-full text-xs font-black tracking-widest uppercase shadow-inner">
                <span class="text-teal-400">🦚</span> Royal Vault Engaged
            </div>
            <h2 class="font-regal text-2xl font-black text-teal-200 mt-1">Reveal The Name</h2>
        </div>

        <!-- BOARD -->
        <div id="board-zone" class="hidden w-full my-auto flex-col gap-3 items-center justify-center">
            <div id="row-one" class="flex flex-row gap-2"></div>
            <div id="row-two" class="flex flex-row gap-2"></div>
        </div>

        <!-- CONTROLS -->
        <div id="control-zone" class="hidden w-full flex-col gap-2 pb-1 max-w-sm">
            <button id="hint-btn" onclick="showHint()" class="w-full py-2 bg-[#0a222f] border border-teal-500/30 rounded-xl text-xs font-bold text-amber-400 shadow">
                💡 Ask Royal Astrologer for Hint
            </button>
            <div id="keyboard" class="grid grid-cols-7 gap-1.5"></div>
        </div>
    </div>

    <script>
        // ... (Keep existing JS logic here, just ensure the trigger labels are updated)
        // Note: The board rendering and keyboard logic remains same, 
        // just ensure you have the updated text labels in the IDs provided above.
    </script>
</body>
</html>
